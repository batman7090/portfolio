<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K Shamanth Kumar — AI & ML Engineer</title>
    <meta name="description" content="AI & ML engineer building RAG pipelines, fine-tuned LLMs, multi-agent systems and production ML infrastructure." />
    <meta name="theme-color" content="#08090c" />

    <!-- Open Graph -->
    <meta property="og:title" content="K Shamanth Kumar — AI & ML Engineer" />
    <meta property="og:description" content="RAG pipelines, fine-tuned LLMs, multi-agent systems, production ML." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&display=swap" rel="stylesheet" />

    <!-- Set the theme before first paint so there is never a flash of the wrong theme. -->
    <script>
      (() => {
        const stored = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = stored || (prefersDark ? 'dark' : 'light')
        document.documentElement.classList.toggle('dark', theme === 'dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
